<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <radialGradient id="ghostGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7b6fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ghostBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7b6fff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#030810"/>

  <!-- Glow behind ghost -->
  <ellipse cx="100" cy="100" rx="80" ry="80" fill="url(#ghostGlow)"/>

  <!-- Ghost body -->
  <path d="M55 95 Q55 45 100 45 Q145 45 145 95 L145 155 Q135 147 125 155 Q115 147 110 155 Q105 147 100 155 Q95 147 90 155 Q80 147 75 155 Q65 147 55 155 Z"
    fill="url(#ghostBody)" opacity="0.95" filter="url(#softGlow)"/>

  <!-- Ghost shimmer -->
  <path d="M65 68 Q72 55 100 52 Q128 55 135 68 Q118 62 100 64 Q82 62 65 68Z"
    fill="white" opacity="0.22"/>

  <!-- Left eye -->
  <ellipse cx="85" cy="92" rx="10" ry="12" fill="white"/>
  <ellipse cx="87" cy="90" rx="5" ry="6" fill="#0a0520"/>
  <circle cx="89" cy="88" r="2" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="115" cy="92" rx="10" ry="12" fill="white"/>
  <ellipse cx="117" cy="90" rx="5" ry="6" fill="#0a0520"/>
  <circle cx="119" cy="88" r="2" fill="white"/>

  <!-- Mouth smile -->
  <ellipse cx="100" cy="114" rx="9" ry="6" fill="#0a0520" opacity="0.6"/>

  <!-- Wavy bottom -->
  <path d="M55 142 Q62 134 70 142 Q78 150 85 142 Q92 134 100 142 Q108 150 115 142 Q122 134 130 142 Q138 150 145 142"
    stroke="#a78bfa" stroke-width="2.5" fill="none" opacity="0.7"/>

  <!-- Dot indicator -->
  <circle cx="145" cy="52" r="7" fill="#00ff9d" filter="url(#glow)" opacity="0.9"/>
  <circle cx="145" cy="52" r="4" fill="#00ff9d"/>

  <!-- BASEVAULT text -->
  <text x="175" y="85"
    font-family="'Courier New', monospace"
    font-size="52"
    font-weight="900"
    letter-spacing="4"
    fill="url(#textGrad)"
    filter="url(#glow)">BASE</text>

  <text x="175" y="145"
    font-family="'Courier New', monospace"
    font-size="52"
    font-weight="900"
    letter-spacing="4"
    fill="#00c8ff"
    filter="url(#glow)">VAULT</text>

  <!-- PRO badge -->
  <rect x="620" y="58" width="52" height="22" rx="4"
    fill="rgba(0,200,255,0.12)" stroke="#00c8ff" stroke-width="1" opacity="0.9"/>
  <text x="646" y="74"
    font-family="'Courier New', monospace"
    font-size="11"
    font-weight="700"
    letter-spacing="2"
    fill="#00c8ff"
    text-anchor="middle">PRO</text>

  <!-- Tagline -->
  <text x="175" y="172"
    font-family="'Courier New', monospace"
    font-size="13"
    letter-spacing="3"
    fill="#3a5a7a">ERC-4626 · UNISWAP V3 · BASE NETWORK</text>

  <!-- Separator line -->
  <line x1="175" y1="100" x2="610" y2="100" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>
</svg>